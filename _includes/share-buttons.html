<div class="share-buttons">
  <h3 class="share-label">COMPARTÍ</h3>

  <button
    class="share-btn share-btn--native"
    data-url="{{ include.url }}"
    data-text="{{ include.text }} {{ include.url }}"
    aria-label="Compartir"
    style="display:none"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    Compartí
  </button>

  <div class="share-platform-buttons">
    <a class="share-btn share-btn--whatsapp"
       href="https://wa.me/?text={{ include.text | append: ' ' | append: include.url | url_encode }}"
       target="_blank" rel="noopener noreferrer" aria-label="Compartir por WhatsApp">

      WhatsApp
    </a>
    <a class="share-btn share-btn--twitter"
       href="https://twitter.com/intent/tweet?url={{ include.url | url_encode }}&text={{ include.text | url_encode }}{% if include.hashtags != '' %}&hashtags={{ include.hashtags }}{% endif %}"
       target="_blank" rel="noopener noreferrer" aria-label="Compartir en Twitter/X">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
      Twitter/X
    </a>
    <a class="share-btn share-btn--telegram"
       href="https://t.me/share/url?url={{ include.url | url_encode }}&text={{ include.text | append: ' ' | append: include.url | url_encode }}"
       target="_blank" rel="noopener noreferrer" aria-label="Compartir por Telegram">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L6.24 13.848l-2.95-.924c-.642-.204-.654-.642.136-.953l11.521-4.44c.535-.194 1.003.131.615.717z"/></svg>
      Telegram

    <a class="share-btn share-btn--facebook"
       href="https://www.facebook.com/sharer/sharer.php?u={{ include.url | url_encode }}"
       target="_blank" rel="noopener noreferrer" aria-label="Compartir en Facebook">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </a>
  </div>
</div>
