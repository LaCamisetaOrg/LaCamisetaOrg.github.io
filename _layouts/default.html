<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph / WhatsApp / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/logo.jpeg">
  <meta property="og:image:alt" content="{{ site.title }}">
  <meta property="og:locale" content="es_AR">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:logo" content="{{ site.url }}{{ site.baseurl }}/logo.jpeg">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/logo.jpeg">
  <meta name="twitter:image:alt" content="{{ site.title }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script src="{{ '/assets/js/flag.js' | relative_url }}"></script>
</head>
<body class="layout-default">
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} Ponete la camiseta</p>
  </footer>
  <script>
    if (navigator.share) {
      document.querySelectorAll('.share-buttons').forEach(function(el) {
        el.querySelector('.share-platform-buttons').style.display = 'none';
        var btn = el.querySelector('.share-btn--native');
        btn.style.display = 'inline-flex';
        btn.addEventListener('click', function() {
          navigator.share({ title: document.title, text: btn.dataset.text, url: btn.dataset.url });
        });
      });
    }

</html>
